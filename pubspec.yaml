name: nearby_pro
description: "NearBy Pro – Smart Location & Career Finder. A professional Flutter UI for discovering places and career opportunities nearby."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1
  firebase_crashlytics: ^4.0.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  intl: ^0.19.0
  google_sign_in: ^6.2.1
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2
  speech_to_text: ^7.3.0
  cloudinary_public: ^0.23.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  mockito: ^5.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
